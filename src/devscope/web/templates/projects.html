{% extends "base.html" %}
{% block title %}projects — devscope{% endblock %}
{% block content %}
<hgroup>
  <h2>Projects</h2>
  <p class="muted">register a project from the CLI: <code>devscope projects add &lt;path&gt; --name &lt;name&gt;</code></p>
</hgroup>

{% if projects %}
<figure>
<table role="grid">
  <thead>
    <tr>
      <th>name</th>
      <th>path</th>
      <th>state</th>
      <th>last activity</th>
    </tr>
  </thead>
  <tbody>
    {% for p in projects %}
    <tr>
      <td><strong>{{ p.name }}</strong></td>
      <td><code>{{ p.path }}</code></td>
      <td><span class="pill">{{ p.state }}</span></td>
      <td class="muted">{{ p.last_activity_at.strftime('%Y-%m-%d %H:%M') if p.last_activity_at else '—' }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</figure>
{% else %}
<p>No projects tracked yet.</p>
{% endif %}
{% endblock %}
