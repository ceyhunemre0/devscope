{% if latest %}
  <p class="muted">latest report · {{ latest.generated_at.strftime('%Y-%m-%d %H:%M UTC') }} · {{ latest.type }}</p>
  <article class="report">{{ latest.content }}</article>
{% else %}
  <p class="muted">No reports yet. Click <strong>Run</strong> to generate your first standup.</p>
{% endif %}
