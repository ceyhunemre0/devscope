name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: macos-arm64,   runner: macos-14,      rust-target: aarch64-apple-darwin }
          - { name: macos-x64,     runner: macos-13,      rust-target: x86_64-apple-darwin }
          - { name: windows-x64,   runner: windows-latest, rust-target: x86_64-pc-windows-msvc }
          - { name: linux-x64,     runner: ubuntu-22.04,  rust-target: x86_64-unknown-linux-gnu }
    runs-on: ${{ matrix.platform.runner }}
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Generate TS types
        run: pnpm --dir frontend gen-types

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Build & publish Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        with:
          tagName: ${{ env.TAG_NAME }}
          releaseName: devscope ${{ env.TAG_NAME }}
          releaseBody: |
            Download the installer for your operating system below.
          releaseDraft: true
          prerelease: false
          projectPath: src-tauri
          args: --target ${{ matrix.platform.rust-target }}
